version: 1.0
runtime: python311
build:
  commands:
    build:
      - pip install --upgrade pip
      - pip install -r requirements.txt
run:
  runtime-version: 3.11
  command: sh -c "reflex init && reflex run --env prod --backend-only --loglevel info"
  network:
    port: 8000
    env: REFLEX_BACKEND_PORT
  env:
    - name: PYTHONUNBUFFERED
      value: "1"